<!-- 
  HOSPITAL TV DASHBOARD
  ---------------------
  This is the main file for the Hospital TV Screen. It shows patients which room to go to.
  It uses HTML for structure, CSS for design, and JavaScript for the "brains" or logic.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital TV Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: This makes the text look modern and professional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS (Styles): This section controls how the dashboard looks (colors, fonts, layout) -->

    <style>
        :root {
            /* These are like variables - we define colors here once and use them throughout the file */
            --bg-dark: #0F1115;
            /* Dark background color */
            --header-teal: #352024;
            /* Dark red/brown for header and footer */
            --tile-bg: #1E2228;
            /* Background for the room boxes */
            --tile-header: #AA410D;
            /* Orange/Brown for the room header */
            --now-serving: #F8F9FA;
            /* White for the main token number */
            --next-label: #7496A4;
            /* Blueish grey for labels */
            --next-bg: #2D3748;
            /* Darker grey for the 'Next' section */
            --text-white: #F8F9FA;
            /* Standard white text */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .lang-transition {
            transition: transform 0.01s ease-in-out, opacity 0.01s ease-in-out;
        }

        .lang-hidden {
            transform: translateY(-5px);
            opacity: 0;
        }

        /* --- HEADER SECTION STYLES --- 
           Controls the top part of the screen where the logo and clock are located.
        */

        /* --- Header --- */
        header {
            background-color: var(--header-teal);
            color: #F4F5EA;
            height: 12vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            height: 60px;
            width: auto;
        }

        .dept-title {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .now-serving-banner {
            font-size: 1.8rem;
            font-weight: 700;
        }

        #clock {
            font-size: 1.4rem;
        }

        /* --- ROOM TILE STYLES --- 
           Controls the look of each individual room 'box' or 'tile' on the screen.
        */

        /* --- Main Removed from here and moved to Transitions section --- */

        .tile {
            background-color: var(--tile-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.5s ease-out;
        }

        .tile-header {
            background-color: var(--tile-header);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .serving-container {
            flex: 1;
            min-height: 0;
            /* Allows this container to shrink if needed to show the Next section */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .serving-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--next-label);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .serving-number {
            color: var(--now-serving);
            font-weight: 800;
            text-align: center;
            line-height: 1;
        }

        /* --- ANIMATION & TRANSITION STYLES --- 
           Controls how pages slide from left to right.
        */

        /* --- Transitions --- */
        main {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #0F1115 0%, #1A1D23 100%);
        }

        #grid-wrapper {
            display: flex;
            height: 100%;
            width: 200%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .grid-layer {
            width: 50%;
            height: 100%;
            padding: 2vh 40px 6vh 40px;
            /* Increased bottom padding to 6vh for a better gap above footer */
            display: grid;
            gap: 20px;
        }

        .next-container {
            background-color: var(--next-bg);
            height: 12vh;
            flex-shrink: 0;
            /* Prevents the Next section from being squashed by the serving area */
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
        }

        .next-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--next-label);
            text-align: center;
            text-transform: uppercase;
        }

        .next-list {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .next-item {
            font-size: 2.2rem;
            font-weight: 700;
            color: #F8F9FA;
        }

        /* --- FOOTER SECTION STYLES --- 
           Small bar at the bottom with the scrolling/static message.
        */

        /* --- Footer --- */
        footer {
            height: 8vh;
            background-color: var(--header-teal);
            color: #F4F5EA;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-text {
            font-size: 2rem;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <img src="assets/logo.png" alt="Logo" class="logo">
            <div id="dept-name" class="dept-title">LOADING...</div>
        </div>
        <div class="header-right">
            <div id="status-label" class="now-serving-banner">Now Serving</div>
            <div id="clock">--:--:-- --</div>
        </div>
    </header>

    <main>
        <div id="grid-wrapper">
            <div id="grid-primary" class="grid-layer"></div>
            <div id="grid-secondary" class="grid-layer"></div>
        </div>
    </main>

    <footer>
        <div id="footer-text" class="footer-text">Please Wait for Your Token Number to be Called</div>
    </footer>

    <script>
        /* 
           CONFIG: This object stores the main settings for the application.
           Think of it like the "Settings" menu in an app.
        */
        const CONFIG = {
            SUPABASE_URL: 'https://oofytczjvpkjbivhwhca.supabase.co',      // URL for our database
            SUPABASE_KEY: 'sb_publishable_IL4q6Yn14gYVadx-qbXxkg_QV92YPpe', // Security key for our database
            DEPARTMENT_ID: 'd55ec19e-759e-48ae-a8c6-380cf9650ca7',          // Which department's data to show
            ROOMS_PER_PAGE: 5,      // How many room boxes to show at once on the screen
            GRID_COLUMNS: 5,        // How many columns to use in the grid layout
            SCROLL_INTERVAL: 10000, // How long to wait before sliding to the next page (10 seconds)
            LANG_INTERVAL: 150000000, // How long to wait before switching languages (currently set very high)
            POLLING_INTERVAL: 15000,  // How often to check for updates from the database (15 seconds)
            START_LANG: 'en',          // The language the app starts in ('hi' for Hindi, 'en' for English)
            TOKEN_ROTATION_INTERVAL: 3000 // How often to switch between multiple "Now Serving" tokens (3 seconds)
        };

        /* 
           TRANSLATIONS: This stores all the text in both English (en) and Hindi (hi).
        */
        const TRANSLATIONS = {
            en: {
                nowServing: "Serving",
                next: "Next",
                footer: "Please Wait for Your Token Number to be Called",
                room: "Room"
            },
            hi: {
                nowServing: "अभी बुलाया गया",
                next: "अगला",
                footer: "कृपया अपने टोकन नंबर बुलाए जाने की प्रतीक्षा करें",
                room: "कमरा"
            }
        };

        /* 
           toHindiDigits: A helper function that converts standard numbers (1, 2, 3) 
           into Hindi numbers (१, २, ३).
        */
        function toHindiDigits(n) {
            const hindiDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(n).split('').map(c => hindiDigits[parseInt(c)] || c).join('');
        }

        /* 
           STATE: These variables keep track of what's happening in the app right now.
        */

        let currentLang = CONFIG.START_LANG;
        let currentPage = 0;
        let rooms = [];
        let tokens = [];
        let departmentName = '';
        let isInitialLoad = true;
        let lastTokensJson = '';
        let servingIndices = {}; // Keeps track of which token to show for each room when multiple are serving

        /* Initialize the Supabase Client: This connects our code to the database */
        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        /* 
           fetchRoomsAndDept: Fetches the Department Name and the list of Rooms from the database.
        */

        async function fetchRoomsAndDept() {
            const { data: dept } = await supabaseClient.from('departments')
                .select('department_name')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .single();

            if (dept) departmentName = dept.department_name;

            const { data: roomsData } = await supabaseClient.from('rooms')
                .select('*')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .order('room_number');

            rooms = roomsData || [];

            if (isInitialLoad) {
                await fetchTokens();
                isInitialLoad = false;
            }

            render();
        }

        /* 
           fetchTokens: Fetches the actual patient token numbers (who is waiting, who is with the doctor).
        */
        async function fetchTokens() {
            const { data } = await supabaseClient
                .from('token_details')
                .select('*')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .in('status', ['in_consultation', 'waiting', 'pending', 'no_show'])
                .order('token_number');

            const newJson = JSON.stringify(data || []);

            if (newJson !== lastTokensJson) {
                tokens = data || [];
                lastTokensJson = newJson;
                servingIndices = {}; // Reset rotation indices when tokens are updated to show the latest data
                render();
            }
        }

        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString();
        }

        function getDynamicFontSize(str) {
            const len = str.length;
            if (len <= 3) return '16rem';
            if (len <= 5) return '11rem';
            if (len <= 8) return '9rem';
            if (len <= 12) return '10rem';
            if (len <= 16) return '8rem';
            return '4rem';
        }

        function getDeptFontSize(str) {
            if (str.length > 40) return '1.8rem';
            if (str.length > 25) return '2.2rem';
            return '2.8rem';
        }

        /* 
           render: This is the most important function. It takes all the data we fetched 
           and creates the HTML that shows up on the screen.
        */
        function render(targetId = 'grid-primary') {
            if (isInitialLoad) return;

            const t = TRANSLATIONS[currentLang];

            const deptTitle = document.getElementById('dept-name');
            deptTitle.textContent = departmentName || "OPD DASHBOARD";
            deptTitle.style.fontSize = getDeptFontSize(deptTitle.textContent);

            document.getElementById('status-label').textContent = t.nowServing;
            document.getElementById('footer-text').textContent = t.footer;

            const activeRooms = rooms.filter(r => r.status === 'active' && tokens.some(t => t.room_id === r.room_id));
            const totalPages = Math.ceil(activeRooms.length / CONFIG.ROOMS_PER_PAGE);
            if (currentPage >= totalPages) currentPage = 0;

            const roomsToShow = activeRooms.slice(
                currentPage * CONFIG.ROOMS_PER_PAGE,
                (currentPage + 1) * CONFIG.ROOMS_PER_PAGE
            );

            const grid = document.getElementById(targetId);
            grid.style.gridTemplateColumns = `repeat(${CONFIG.GRID_COLUMNS}, 1fr)`;
            const fragment = document.createDocumentFragment();

            roomsToShow.forEach(room => {
                // Find all tokens currently with the doctor (in_consultation) in this room
                const serving = tokens.filter(t => t.room_id === room.room_id && t.status === 'in_consultation');

                // Get the index of the token we should currently show (for rotation)
                let currentIndex = servingIndices[room.room_id] || 0;

                // If the index is out of bounds (e.g. token removed), reset to 0
                if (currentIndex >= serving.length) currentIndex = 0;
                servingIndices[room.room_id] = currentIndex;

                // Pick only ONE token to show
                const currentServingToken = serving[currentIndex];
                const servingNumber = currentServingToken ? currentServingToken.token_number : '';

                const next = tokens.filter(t => t.room_id === room.room_id && ['waiting', 'pending'].includes(t.status)).slice(0, 3);

                const tile = document.createElement('div');
                tile.className = 'tile';

                tile.innerHTML = `
                    <div class="tile-header">${t.room} ${currentLang === 'hi' ? toHindiDigits(room.room_number) : room.room_number}</div>
                    <div class="serving-container">
                        <div class="serving-label">${t.nowServing}</div>
                        <div class="serving-number" style="font-size: 14rem">
                            ${currentLang === 'hi' ? toHindiDigits(servingNumber) : servingNumber}
                        </div>
                    </div>
                    <div class="next-container">
                        <div class="next-label">${t.next}</div>
                        <div class="next-list">
                            <div class="next-item">
                                ${next.map(n => (currentLang === 'hi' ? toHindiDigits(n.token_number) : n.token_number)).join(', ') || '---'}
                            </div>
                        </div>
                    </div>
                `;
                fragment.appendChild(tile);
            });

            grid.innerHTML = '';
            grid.appendChild(fragment);
        }

        /* 
           transitionPage: Handles the sliding animation when moving from one page of rooms to the next.
        */
        async function transitionPage() {
            const activeRooms = rooms.filter(r => r.status === 'active' && tokens.some(t => t.room_id === r.room_id));
            const totalPages = Math.ceil(activeRooms.length / CONFIG.ROOMS_PER_PAGE);
            if (totalPages <= 1) return;

            const nextPage = (currentPage + 1) % totalPages;

            // Temporary override currentPage to render next page to secondary
            const savedPage = currentPage;
            currentPage = nextPage;
            render('grid-secondary');
            currentPage = savedPage;

            const wrapper = document.getElementById('grid-wrapper');
            wrapper.style.transform = 'translateX(-50%)';

            setTimeout(() => {
                currentPage = nextPage;
                render('grid-primary'); // Update primary with new content
                wrapper.style.transition = 'none';
                wrapper.style.transform = 'none';
                wrapper.offsetHeight; // trigger reflow
                wrapper.style.transition = '';
            }, 1000); // match CSS transition duration
        }

        setInterval(updateClock, 1000); // Update the clock every second
        setInterval(fetchTokens, CONFIG.POLLING_INTERVAL); // Fetch updates every 15 seconds

        // Auto-scroll logic with smooth transition: Slides to the next page of rooms
        setInterval(transitionPage, CONFIG.SCROLL_INTERVAL);

        /* 
           rotateServingTokens: Increments the display index for each room's serving tokens 
           and re-renders the grid to show the next one.
        */
        function rotateServingTokens() {
            rooms.forEach(room => {
                const serving = tokens.filter(t => t.room_id === room.room_id && t.status === 'in_consultation');
                if (serving.length > 1) {
                    servingIndices[room.room_id] = ((servingIndices[room.room_id] || 0) + 1) % serving.length;
                }
            });
            render();
        }
        setInterval(rotateServingTokens, CONFIG.TOKEN_ROTATION_INTERVAL);

        // Language switching logic with fast transition
        setInterval(() => {
            const wrapper = document.getElementById('grid-wrapper');
            const header = document.querySelector('header');
            const footer = document.querySelector('footer');
            const elements = [wrapper, header, footer];

            elements.forEach(el => {
                el.classList.add('lang-transition');
                el.classList.add('lang-hidden');
            });

            setTimeout(() => {
                currentLang = currentLang === 'en' ? 'hi' : 'en';
                render();
                elements.forEach(el => el.classList.remove('lang-hidden'));

                // Cleanup classes after animation
                setTimeout(() => {
                    elements.forEach(el => el.classList.remove('lang-transition'));
                }, 10);
            }, 10); // Ultra-fast fade out
        }, CONFIG.LANG_INTERVAL);

        /* 
           Real-time Subscription: This tells the app to listen for any changes 
           in the 'token_details' table and update immediately if someone is called.
        */
        supabaseClient.channel('token-updates')
            .on('postgres_changes', {
                event: '*',
                table: 'token_details'
            }, fetchTokens)
            .subscribe();

        fetchRoomsAndDept();
        updateClock();
    </script>

</body>

</html>
