<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital TV Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #F4F5EA;
            --header-teal: #352024;
            --tile-bg: #FFFFFF;
            --tile-header: #AA410D;
            --now-serving: #E7AB37;
            --next-label: #7496A4;
            --next-bg: #F4E8BF;
            --text-white: #352024;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            background-color: var(--header-teal);
            color: #F4F5EA;
            height: 12vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            height: 60px;
            width: auto;
        }

        .dept-title {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .now-serving-banner {
            font-size: 1.8rem;
            font-weight: 700;
        }

        #clock {
            font-size: 1.4rem;
        }

        /* --- Main --- */
        main {
            flex: 1;
            padding: 2vh 40px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            background: linear-gradient(180deg, #F4F5EA 0%, #EAC686 100%);
        }

        .tile {
            background-color: var(--tile-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.08);
            animation: fadeIn 0.5s ease-out;
        }

        .tile-header {
            background-color: var(--tile-header);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .serving-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .serving-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--next-label);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .serving-number {
            color: var(--now-serving);
            font-weight: 800;
            text-align: center;
            line-height: 1;
        }

        .next-container {
            background-color: var(--next-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .next-label {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--next-label);
            text-align: center;
            text-transform: uppercase;
        }

        .next-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .next-item {
            font-size: 2.2rem;
            font-weight: 700;
            color: #352024;
        }

        /* --- Footer --- */
        footer {
            height: 8vh;
            background-color: var(--header-teal);
            color: #F4F5EA;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-text {
            font-size: 2rem;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <img src="assets/logo.png" alt="Logo" class="logo">
            <div id="dept-name" class="dept-title">LOADING...</div>
        </div>
        <div class="header-right">
            <div id="status-label" class="now-serving-banner">Now Serving</div>
            <div id="clock">--:--:-- --</div>
        </div>
    </header>

    <main id="main-grid"></main>

    <footer>
        <div id="footer-text" class="footer-text">Please Wait for Your Token Number to be Called</div>
    </footer>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://oofytczjvpkjbivhwhca.supabase.co',
            SUPABASE_KEY: 'sb_publishable_IL4q6Yn14gYVadx-qbXxkg_QV92YPpe',
            DEPARTMENT_ID: 'd55ec19e-759e-48ae-a8c6-380cf9650ca7',
            ROOMS_PER_PAGE: 6,
            SCROLL_INTERVAL: 20000,
            LANG_INTERVAL: 10000,
            REFRESH_INTERVAL: 4000
        };

        const TRANSLATIONS = {
            en: {
                nowServing: "Now Serving",
                next: "Next",
                footer: "Please Wait for Your Token Number to be Called",
                room: "Room"
            },
            hi: {
                nowServing: "अभी बुलाया गया",
                next: "अगला",
                footer: "कृपया अपने टोकन नंबर बुलाए जाने की प्रतीक्षा करें",
                room: "कमरा"
            }
        };

        function toHindiDigits(n) {
            const hindiDigits = ['०','१','२','३','४','५','६','७','८','९'];
            return String(n).split('').map(c => hindiDigits[parseInt(c)] || c).join('');
        }

        let currentLang = 'en';
        let currentPage = 0;
        let rooms = [];
        let tokens = [];
        let departmentName = '';
        let isInitialLoad = true;
        let lastTokensJson = '';

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function fetchRoomsAndDept() {
            const { data: dept } = await supabaseClient.from('departments')
                .select('department_name')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .single();

            if (dept) departmentName = dept.department_name;

            const { data: roomsData } = await supabaseClient.from('rooms')
                .select('*')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .order('room_number');

            rooms = roomsData || [];

            if (isInitialLoad) {
                await fetchTokens();
                isInitialLoad = false;
            }

            render();
        }

        async function fetchTokens() {
            const { data } = await supabaseClient
                .from('token_details')
                .select('*')
                .eq('department_id', CONFIG.DEPARTMENT_ID)
                .in('status', ['in_consultation', 'waiting'])
                .order('token_number');

            const newJson = JSON.stringify(data || []);

            if (newJson !== lastTokensJson) {
                tokens = data || [];
                lastTokensJson = newJson;
                render();
            }
        }

        function updateClock() {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString();
        }

        function getDynamicFontSize(str) {
            if (str.length <= 3) return '6rem';
            if (str.length <= 6) return '4.5rem';
            if (str.length <= 10) return '3.5rem';
            return '2.5rem';
        }

        function render() {
            if (isInitialLoad) return;

            const t = TRANSLATIONS[currentLang];

            document.getElementById('dept-name').textContent = departmentName || "OPD DASHBOARD";
            document.getElementById('status-label').textContent = t.nowServing;
            document.getElementById('footer-text').textContent = t.footer;

            const activeRooms = rooms.filter(r => r.status === 'active');
            const totalPages = Math.ceil(activeRooms.length / CONFIG.ROOMS_PER_PAGE);
            if (currentPage >= totalPages) currentPage = 0;

            const roomsToShow = activeRooms.slice(
                currentPage * CONFIG.ROOMS_PER_PAGE,
                (currentPage + 1) * CONFIG.ROOMS_PER_PAGE
            );

            const grid = document.getElementById('main-grid');
            const fragment = document.createDocumentFragment();

            roomsToShow.forEach(room => {
                const serving = tokens.filter(t => t.room_id === room.room_id && t.status === 'in_consultation');
                const next = tokens.filter(t => t.room_id === room.room_id && t.status === 'waiting').slice(0, 3);

                const servingNumbers = serving.map(t => t.token_number).join(', ') || '---';

                const tile = document.createElement('div');
                tile.className = 'tile';

                tile.innerHTML = `
                    <div class="tile-header">Room ${room.room_number}</div>
                    <div class="serving-container">
                        <div class="serving-label">${t.nowServing}</div>
                        <div class="serving-number" style="font-size:${getDynamicFontSize(servingNumbers)}">
                            ${servingNumbers}
                        </div>
                    </div>
                    <div class="next-container">
                        <div class="next-label">${t.next}</div>
                        <div class="next-list">
                            ${next.map(n => `<div class="next-item">${n.token_number}</div>`).join('') || '<div class="next-item">---</div>'}
                        </div>
                    </div>
                `;
                fragment.appendChild(tile);
            });

            grid.innerHTML = '';
            grid.appendChild(fragment);
        }

        setInterval(updateClock, 1000);
        setInterval(fetchTokens, 15000); // polling

        supabaseClient.channel('token-updates')
            .on('postgres_changes', {
                event: '*',
                table: 'token_details'
            }, fetchTokens)
            .subscribe();

        fetchRoomsAndDept();
        updateClock();
    </script>

</body>
</html>
